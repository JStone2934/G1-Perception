# =====================================================
# Head camera — Intel RealSense D435i RGB (OpenCV/V4L2)
# 发现命令: teleimager-server --cf
# =====================================================

head_camera:
  enable_zmq: true
  zmq_port: 55555
  enable_webrtc: true
  webrtc_port: 60001
  webrtc_codec: h264

  type: opencv
  fourcc: YUYV   # RealSense RGB UVC 实际为 YUYV；写 UYVY 会导致色彩错误

  image_shape: [480, 848]
  binocular: false
  fps: 30

  # OpenCV 模式下优先按序列号锁定 RGB 通道；也可显式指定 video_id: 4
  serial_number: "351623061215"
  video_id: 4

# =====================================================
# 热成像 — GY-MCU90640 串口（type: thermal）
# 远端 teleimager-client 会显示为 "Left Wrist Camera" 窗口，无需改客户端
# =====================================================
left_wrist_camera:
  enable_zmq: true
  zmq_port: 55556
  enable_webrtc: false
  optional: true              # 热成像未接/超时时仍启动 RGB

  type: thermal
  serial_port: /dev/ttyUSB0
  baud: 460800
  use_init: false
  overlay: true
  settle_s: 0.12          # START 后等待模块出帧（秒）
  read_timeout: 1.0       # 串口读帧超时；勿设 0

  image_shape: [480, 640]
  binocular: false
  fps: 2                  # GY-MCU 实测约 2Hz；设过高会空转

right_wrist_camera:
  enable_zmq: false
