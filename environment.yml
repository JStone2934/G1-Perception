# 若继续使用已有环境，不必 conda env create；在 thermal 里 pip install 即可。
# name 仅在新环境时使用；推荐保持: conda activate thermal
name: thermal
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - matplotlib
  - pyserial
  - pip:
      - -e ./IrThermal/packages/irthermal[gui,i2c]
      - -e "./teleimager[server]"
